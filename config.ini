[general]
symboles_per_second = 80000 #This is not the average but rather the speed when transmitting, which is probably 10% of the time
preamble = B30FDD4 #length 28 hex optimal code from https://ntrs.nasa.gov/api/citations/19800017860/downloads/19800017860.pdf
package_size = 228 #number of symboles in transmittion package, including preamble
modulation_scheme = QPSK


[adalm_pluto]
ip = ip:192.168.2.1 #"ip:192.168.2.2"
rx_recive_freq = 915.1e6
rx_lo_freq = 915e6 # Hz
tx_lo_freq = 915e6 # Hz
rx_gain = 0 #range:   0 to 74.5dB
tx_gain = 0 #range: -90 to    0dB
rx_buffer_size = 262144 #data buffer size of rx 2^18 gives 10 packeges per second
max_freq_offset_ppm = 25 #max frequenzy offsett in ppm

[filter]
path = "rrc_filter.ftr"
tx_bandwidth = 20000
rx_bandwidth = 20000
beta = 0.7
span = 5
sps_tx = 8
sps_rx = 8

[downsampler]
kp_symbolsync = 20 #3
ki_symbolsync = 0 #0
plot_eye = 1
plot_sampling_error = 1
interpolation_rate = 10 #interpolation in downsampler

[freq_sync]
kp = 0.5 #0.5
ki = 0.1 #0.1
plot_error = 1

[course_freq_sync]
plot_freq_spectrum = 0

[preamble_detector]
correlation_treshold = 200 #Height over noize floor to classyfi as signal

[simulator]
channel_delay = 10.5 #normalized to symbol time
phase_offsett = 0 #in radians
frequency_accuracy_ppm = 0 #parts per million, adam pluto has 25ppm accuracy
simulation = 1
noise_level = 0.0 #0.1 #no clue what the unit is. This is std in the channel
data_points_in_package = 100
number_of_data_packages = 5
sending_factor = 0.1 #factor of time used for transmittion

[source_coder]
fs = 16000      # sample rate. Settes til 48kHz som er standard for PCer ? Satt til 16000 på grunn av opus
channels = 1        # Setter til 1 slik at vi sender mono lyd. Kan sette til 2 for å ta opp stereo. 
frame_ms = 20           # Opus-frames (typisk 20 ms)
frame_samples = int(fs * frame_ms / 1000)  # 320 ved 16 kHz
bitrate = 6000         # 6 kb/s target
block = frame_samples # Hvor mange samples vi får per callback.

