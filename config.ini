[general]
carrier_frequency = 960e6
symboles_per_second = 8000


[filter]
path = "rrc_filter.ftr"
tx_gain = 0
rx_gain = -6
interpolation_rate = 2
demodulation_rate = 1
tx_bandwidth = 20000
rx_bandwidth = 20000
beta = 0.7
span = 5
sps_tx = 10
sps_rx = 10

[downsampler]
kp_symbolsync = 3 #3
ki_symbolsync = 0 #0
plot_eye = 0
plot_sampling_error = 0

[freq_sync]
kp = 0.05 #0.5
ki = 0.01 #0.2
plot_error = 1

[simulator]
channel_delay = 0.2 #normalized to symbol time
phase_offsett = 0.5 #in radians
frequency_accuracy_ppm = 0.1 #parts per million, adam pluto has 25ppm accuracy
simulation = 1
noise_level = 0.1 #no clue what the unit is. This is std in the channel

[source_coder]
fs = 16000      # sample rate. Settes til 48kHz som er standard for PCer ? Satt til 16000 på grunn av opus
channels = 1        # Setter til 1 slik at vi sender mono lyd. Kan sette til 2 for å ta opp stereo. 
frame_ms = 20           # Opus-frames (typisk 20 ms)
frame_samples = int(fs * frame_ms / 1000)  # 320 ved 16 kHz
bitrate = 6000         # 6 kb/s target
block = frame_samples # Hvor mange samples vi får per callback.
